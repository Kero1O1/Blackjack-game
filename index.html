<html>
    <head>
        <title>Blackjack</title>
  <link rel="icon" type="image/x-icon" href="/images/blackjack.png">

        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <h1>Blackjack</h1>

        <!-- Setup screen -->
        <div id="setup-el">
            <h2>Set Up Your Game</h2>
            <div class="form-row">
                <label for="name-input">Your Name</label>
                <input id="name-input" type="text" placeholder="Enter your name" maxlength="20">
            </div>
            <div class="form-row">
                <label for="chips-input">Starting Chips ($)</label>
                <input id="chips-input" type="number" placeholder="200" min="1" value="200">
            </div>
            <button onclick="setupPlayer()">LET'S PLAY</button>
        </div>

        <!-- Game screen -->
        <div id="game-el" style="display:none">
            <div class="players-container">
                <div class="player-panel" id="bot-panel">
                    <h2>Bot</h2>
                    <p id="bot-info-el">Bot: $200</p>
                    <p id="bot-cards-el">Cards: —</p>
                    <p id="bot-sum-el">Sum: —</p>
                </div>
                <div class="divider">VS</div>
                <div class="player-panel" id="human-panel">
                    <h2 id="player-name-el">You</h2>
                    <p id="player-info-el"></p>
                    <p id="player-cards-el">Cards: —</p>
                    <p id="player-sum-el">Sum: —</p>
                </div>
            </div>

            <p id="message-el">Place your bet to start a round!</p>

            <div id="bet-section">
                <label for="bet-input">Your Bet ($)</label><br>
                <input id="bet-input" type="number" placeholder="Enter bet" min="1">
                <br>
                <button onclick="startGame()">START GAME</button>
            </div>

            <div id="action-buttons" style="display:none">
                <button onclick="newCard()">NEW CARD</button>
                <button onclick="stand()">STAND</button>
            </div>

            <div id="result-section" style="display:none">
                <button id="play-again-btn" onclick="playAgain()">PLAY AGAIN</button>
            </div>
        </div>

        <script src="index.js"></script>
    </body>
</html>
